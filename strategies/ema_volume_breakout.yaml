enabled: false
entry_conditions:
  long:
  - close > ema_fast and ema_fast > ema_slow and volume > volume_sma * 1.2 and rsi
    < 70
  short:
  - close < ema_fast and ema_fast < ema_slow and volume > volume_sma * 1.2 and rsi
    > 30
exit_conditions:
  long:
  - close < ema_slow
  short:
  - close > ema_slow
indicators:
  ema:
    period: ''
    source: close
  rsi:
    period: 14
    source: close
ml_config:
  confidence_threshold: 0.7
  enabled: true
  features:
  - volume_ratio
  - price_momentum_24h
  weight: 0.35
mode: trend
name: EMA+Volume Breakout
reduce_conditions:
  long: []
  short: []
symbols: []
timeframes:
- 15m
- 1h
