enabled: false
entry_conditions:
  long:
  - rsi < 35 and macd_histogram > 0
  short:
  - rsi > 70 and macd_histogram < 0
exit_conditions:
  long:
  - rsi > 65
  short:
  - rsi < 35
indicators:
  bollinger:
    period: 20
    stddev: 2
  macd:
    fast: 12
    signal: 9
    slow: 26
  rsi:
    period: 14
    source: close
ml_config:
  confidence_threshold: 0.6
  enabled: true
  features: []
  weight: 0.3
mode: momentum
name: Momentum MACD-RSI Bollinger Bands with Reductions
reduce_conditions:
  long:
  - condition: rsi > 55 and close > bollinger_upper
    reduce_pct: 50
  short:
  - condition: rsi < 40 and close < bollinger_lower
    reduce_pct: 50
symbols: []
timeframes:
- 1m
- 5m
