enabled: false
entry_conditions:
  long:
  - rsi < 35 and macd_histogram > 0
  - (close > bollinger_middle) and (volume_ratio > 1.5)
  short:
  - rsi > 70 and macd_histogram < 0
exit_conditions:
  long:
  - rsi > 65 or close < bollinger_lower
  short:
  - rsi < 35 or close > bollinger_upper
indicators:
  bollinger:
    period: 20
    stddev: 2
  macd:
    fast: 12
    signal: 9
    slow: 26
  rsi:
    period: 14
    source: close
ml_config:
  confidence_threshold: 0.6
  enabled: true
  features: []
  weight: 0.4
mode: trend
name: RSI+MACD Trend
reduce_conditions:
  long:
  - condition: rsi > 55 and close > bollinger_upper
    reduce_pct: 50
  - condition: rsi > 70 and volume_ratio > 1.8
    reduce_pct: 30
  short:
  - condition: rsi < 40 and close < bollinger_lower
    reduce_pct: 50
symbols: []
timeframes:
- 1h
- 4h
