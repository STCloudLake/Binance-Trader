{% extends "base.html" %}
{% block content %}
<h2 class="text-xl mb-4">{{ _("Backtest") }}</h2>

<!-- Tab Navigation -->
<div class="flex gap-1 mb-4 border-b border-slate-700">
    <button class="bt-tab px-4 py-2 rounded-t text-sm bg-sky-700 text-white" data-tab="config" onclick="switchBtTab('config')">{{ _("Config") }}</button>
    <button class="bt-tab px-4 py-2 rounded-t text-sm bg-slate-700 text-slate-400" data-tab="results" onclick="switchBtTab('results')">{{ _("Results") }}</button>
    <button class="bt-tab px-4 py-2 rounded-t text-sm bg-slate-700 text-slate-400" data-tab="history" onclick="switchBtTab('history')">{{ _("History") }}</button>
</div>

<!-- Tab: Config -->
<div id="bt-tab-config" class="bt-tab-content">
    <div hx-get="/partials/backtest-config" hx-trigger="load">
        <div class="text-slate-500">{{ _("Loading...") }}</div>
    </div>
</div>

<!-- Tab: Results -->
<div id="bt-tab-results" class="bt-tab-content hidden">
    <div id="backtest-results">
        <div class="text-slate-500 text-center py-8">{{ _("Run a backtest to see results") }}</div>
    </div>
</div>

<!-- Tab: History -->
<div id="bt-tab-history" class="bt-tab-content hidden">
    <div hx-get="/partials/backtest-list" hx-trigger="load, every 30s">
        <div class="text-slate-500">{{ _("Loading...") }}</div>
    </div>
</div>

<style>
.bt-tab-content.hidden { display: none; }
</style>
<script>
function switchBtTab(tab) {
    document.querySelectorAll('.bt-tab').forEach(function(b) {
        if (b.dataset.tab === tab) {
            b.className = 'bt-tab px-4 py-2 rounded-t text-sm bg-sky-700 text-white';
        } else {
            b.className = 'bt-tab px-4 py-2 rounded-t text-sm bg-slate-700 text-slate-400';
        }
    });
    document.querySelectorAll('.bt-tab-content').forEach(function(c) {
        c.classList.add('hidden');
    });
    var el = document.getElementById('bt-tab-' + tab);
    if (el) el.classList.remove('hidden');
}
function switchToResults() {
    switchBtTab('results');
    // Scroll to results
    setTimeout(function() {
        var el = document.getElementById('bt-tab-results');
        if (el) el.scrollIntoView({behavior:'smooth'});
    }, 100);
}

// Reconnect to running backtest after page navigation
(function() {
    var saved = sessionStorage.getItem('_bt_runId');
    if (!saved) return;
    fetch('/api/backtest/progress/' + saved).then(function(r){return r.json();}).then(function(d){
        if (d.done) {
            sessionStorage.removeItem('_bt_runId');
            fetch('/api/backtest/result/' + saved).then(function(r){return r.text();}).then(function(h){
                var el = document.getElementById('backtest-results');
                if (el) el.innerHTML = h;
            });
        } else {
            window._btActiveRunId = saved;
            var el = document.getElementById('backtest-results');
            if (!el) return;
            el.innerHTML = '<div class="card mb-4" id="bt-progress-card"><h3 class="text-lg mb-3">Running Backtest...</h3><div class="w-full bg-slate-700 rounded-full h-4 mb-2"><div id="bt-progress-fill" class="bg-sky-500 h-4 rounded-full" style="width:'+(d.pct||0)+'%"></div></div><span id="bt-progress-text" class="text-xs text-slate-400">'+(d.pct||0)+'%</span></div>';
            var timer = setInterval(function(){
                var f = document.getElementById('bt-progress-fill');
                if (!f) { clearInterval(timer); return; }
                fetch('/api/backtest/progress/' + saved).then(function(r){return r.json();}).then(function(d2){
                    f.style.width = (d2.pct||0) + '%';
                    var t = document.getElementById('bt-progress-text');
                    if (t) t.textContent = (d2.pct||0) + '%';
                    if (d2.done) {
                        clearInterval(timer);
                        sessionStorage.removeItem('_bt_runId');
                        fetch('/api/backtest/result/' + saved).then(function(r){return r.text();}).then(function(h){
                            var rs = document.getElementById('backtest-results');
                            if (rs) rs.innerHTML = h;
                        });
                    }
                });
            }, 1500);
        }
    });
})();
</script>
{% endblock %}
