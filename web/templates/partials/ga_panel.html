<div class="card mb-4" id="ga-panel">
    <h3 class="text-lg mb-3">{{ _("Genetic Algorithm Strategy Evolution") }}</h3>

    <!-- Config -->
    <div class="mb-4 space-y-2">
        <div class="grid grid-cols-4 gap-3">
            <div>
                <label class="text-sm text-slate-400">Population</label>
                <input type="number" id="ga-pop-size" value="60" min="20" max="120"
                       class="w-full bg-slate-800 border border-slate-600 rounded px-3 py-1.5 text-white text-sm">
            </div>
            <div>
                <label class="text-sm text-slate-400">Generations</label>
                <input type="number" id="ga-generations" value="20" min="5" max="50"
                       class="w-full bg-slate-800 border border-slate-600 rounded px-3 py-1.5 text-white text-sm">
            </div>
            <div>
                <label class="text-sm text-slate-400">Start Date</label>
                <input type="date" id="ga-date-start" value="2026-05-01"
                       class="w-full bg-slate-800 border border-slate-600 rounded px-3 py-1.5 text-white text-sm">
            </div>
            <div>
                <label class="text-sm text-slate-400">End Date</label>
                <input type="date" id="ga-date-end" value="2026-05-15"
                       class="w-full bg-slate-800 border border-slate-600 rounded px-3 py-1.5 text-white text-sm">
            </div>
        </div>

        <div class="flex gap-2">
            <button onclick="startGA()" id="ga-start-btn"
                    class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded text-sm font-bold">
                Start Evolution
            </button>
            <button onclick="stopGA()" id="ga-stop-btn"
                    class="bg-red-600 hover:bg-red-500 text-white px-6 py-2 rounded text-sm font-bold hidden">
                Stop
            </button>
            <span id="ga-status-text" class="text-sm text-slate-400 self-center"></span>
        </div>
    </div>

    <!-- Progress -->
    <div id="ga-progress" class="hidden mb-4">
        <div class="flex justify-between text-xs text-slate-400 mb-1">
            <span id="ga-gen-text">Generation 0/0</span>
            <span id="ga-fit-text">Best Fitness: -</span>
        </div>
        <div class="w-full bg-slate-700 rounded-full h-3 mb-2">
            <div id="ga-progress-fill" class="bg-emerald-500 h-3 rounded-full transition-all" style="width:0%"></div>
        </div>
        <div class="grid grid-cols-3 gap-2 text-xs text-slate-400">
            <span>Sharpe: <strong id="ga-sharpe" class="text-slate-300">-</strong></span>
            <span>Win Rate: <strong id="ga-winrate" class="text-slate-300">-</strong></span>
            <span>Trades: <strong id="ga-trades" class="text-slate-300">-</strong></span>
        </div>
    </div>

    <!-- Champion -->
    <div id="ga-champion" class="hidden bg-emerald-900/30 border border-emerald-600 rounded p-4">
        <h4 class="text-emerald-400 font-bold mb-2">Champion Strategy</h4>
        <div id="ga-champion-info" class="text-sm text-slate-300"></div>
    </div>

    <!-- Error -->
    <div id="ga-error" class="hidden bg-red-900/30 border border-red-600 rounded p-3 text-red-400 text-sm mt-2"></div>
</div>

<script>
var _gaPollTimer = null;

function startGA() {
    var btn = document.getElementById('ga-start-btn');
    btn.disabled = true;
    btn.textContent = 'Starting...';

    fetch('/api/ga/evolve', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            symbols: ['BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT'],
            date_start: document.getElementById('ga-date-start').value,
            date_end: document.getElementById('ga-date-end').value,
            population_size: parseInt(document.getElementById('ga-pop-size').value),
            generations: parseInt(document.getElementById('ga-generations').value),
        })
    }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.ok) {
            document.getElementById('ga-start-btn').classList.add('hidden');
            document.getElementById('ga-stop-btn').classList.remove('hidden');
            document.getElementById('ga-progress').classList.remove('hidden');
            document.getElementById('ga-error').classList.add('hidden');
            _gaPollTimer = setInterval(pollGAStatus, 3000);
            pollGAStatus();
        } else {
            document.getElementById('ga-error').classList.remove('hidden');
            document.getElementById('ga-error').textContent = 'Error: ' + (data.error || 'unknown');
            btn.disabled = false;
            btn.textContent = 'Start Evolution';
        }
    });
}

function stopGA() {
    fetch('/api/ga/stop', {method: 'POST'}).then(function() {
        clearInterval(_gaPollTimer);
        document.getElementById('ga-start-btn').classList.remove('hidden');
        document.getElementById('ga-start-btn').disabled = false;
        document.getElementById('ga-start-btn').textContent = 'Start Evolution';
        document.getElementById('ga-stop-btn').classList.add('hidden');
        document.getElementById('ga-status-text').textContent = 'Stopped';
    });
}

function pollGAStatus() {
    fetch('/api/ga/status').then(function(r) { return r.json(); }).then(function(s) {
        if (!s.running && s.generation > 0) {
            clearInterval(_gaPollTimer);
            document.getElementById('ga-start-btn').classList.remove('hidden');
            document.getElementById('ga-start-btn').disabled = false;
            document.getElementById('ga-start-btn').textContent = 'Start Evolution';
            document.getElementById('ga-stop-btn').classList.add('hidden');
            document.getElementById('ga-status-text').textContent = 'Complete';
        }

        var pct = s.total_generations > 0 ? Math.round(s.generation / s.total_generations * 100) : 0;
        document.getElementById('ga-progress-fill').style.width = pct + '%';
        document.getElementById('ga-gen-text').textContent = 'Generation ' + s.generation + '/' + s.total_generations;
        document.getElementById('ga-fit-text').textContent = 'Best Fitness: ' + (s.best_fitness || 0).toFixed(2);
        document.getElementById('ga-sharpe').textContent = (s.best_sharpe || 0).toFixed(2);
        document.getElementById('ga-winrate').textContent = (s.best_win_rate || 0).toFixed(1) + '%';
        document.getElementById('ga-trades').textContent = s.best_trades || 0;

        if (s.champion_name) {
            document.getElementById('ga-champion').classList.remove('hidden');
            document.getElementById('ga-champion-info').textContent =
                s.champion_name + ' | Fitness: ' + (s.best_fitness || 0).toFixed(2) +
                ' | Sharpe: ' + (s.best_sharpe || 0).toFixed(2);
        }

        if (s.error) {
            document.getElementById('ga-error').classList.remove('hidden');
            document.getElementById('ga-error').textContent = s.error;
        }
    });
}
</script>
