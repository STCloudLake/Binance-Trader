<div class="card mb-4" id="bt-progress-card">
    <h3 class="text-lg mb-3">{{ _("Running Backtest") }}...</h3>
    <p class="text-xs text-slate-500 mb-2">{{ date_start }} ~ {{ date_end }}</p>

    <!-- Progress bar -->
    <div class="w-full bg-slate-700 rounded-full h-4 mb-2 overflow-hidden">
        <div id="bt-progress-fill" class="bg-sky-500 h-4 rounded-full transition-all duration-300" style="width: 0%"></div>
    </div>
    <div class="flex justify-between text-xs text-slate-400">
        <span id="bt-progress-text">0%</span>
        <span id="bt-progress-steps">0 / ?</span>
    </div>

    <!-- Results slot — swapped in when done -->
    <div id="backtest-results" class="mt-4"></div>
</div>

<script>
(function() {
    var runId = '{{ run_id }}';
    var pollTimer = setInterval(async function() {
        try {
            var resp = await fetch('/api/backtest/progress/' + runId);
            var data = await resp.json();
            var pct = data.pct || 0;
            document.getElementById('bt-progress-fill').style.width = pct + '%';
            document.getElementById('bt-progress-text').textContent = pct + '%';
            document.getElementById('bt-progress-steps').textContent = data.progress + ' / ' + data.total;

            if (data.done) {
                clearInterval(pollTimer);
                // Load results
                var resultResp = await fetch('/api/backtest/result/' + runId);
                var html = await resultResp.text();
                document.getElementById('backtest-results').innerHTML = html;
                switchToResults();
            }
        } catch(e) {
            console.error('Progress poll error:', e);
        }
    }, 1500);
})();
</script>
