<div class="card mb-4" id="bt-progress-card">
    <h3 class="text-lg mb-3">{{ _("Running Backtest") }}...</h3>
    <p class="text-xs text-slate-500 mb-2">{{ date_start }} ~ {{ date_end }}</p>

    <!-- Progress bar -->
    <div class="w-full bg-slate-700 rounded-full h-4 mb-2 overflow-hidden">
        <div id="bt-progress-fill" class="bg-sky-500 h-4 rounded-full transition-all duration-300" style="width: 0%"></div>
    </div>
    <div class="flex justify-between text-xs text-slate-400">
        <span id="bt-progress-text">0%</span>
        <span id="bt-progress-steps">0 / ?</span>
    </div>

    <!-- Results slot — swapped in when done -->
    <div id="backtest-results" class="mt-4"></div>
</div>

<script>
(function() {
    var runId = '{{ run_id }}';
    window._btActiveRunId = runId;

    function updateProgressBar() {
        var fill = document.getElementById('bt-progress-fill');
        var text = document.getElementById('bt-progress-text');
        var steps = document.getElementById('bt-progress-steps');
        if (!fill || !text) return; // element not in DOM (tab switched away)

        fetch('/api/backtest/progress/' + runId).then(function(r) { return r.json(); }).then(function(data) {
            if (!document.getElementById('bt-progress-fill')) return; // DOM state changed
            var pct = data.pct || 0;
            fill.style.width = pct + '%';
            text.textContent = pct + '%';
            if (steps) steps.textContent = data.progress + ' / ' + data.total;

            if (data.done) {
                window._btActiveRunId = null;
                fetch('/api/backtest/result/' + runId).then(function(r) { return r.text(); }).then(function(html) {
                    var results = document.getElementById('backtest-results');
                    if (results) results.innerHTML = html;
                });
            }
        }).catch(function(e) { console.error('Progress poll error:', e); });
    }

    var pollTimer = setInterval(updateProgressBar, 1500);
    updateProgressBar(); // immediate first call
})();
</script>
